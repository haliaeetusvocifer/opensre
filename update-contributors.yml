name: Update Contributors

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight
  workflow_dispatch:

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contributors and update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Fetch all contributors (handles pagination)
            let contributors = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.repos.listContributors({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });
              if (data.length === 0) break;
              contributors = contributors.concat(data.filter(c => c.type !== 'Bot'));
              page++;
            }

            // Build the contributors grid HTML
            const cols = 7;
            let rows = '';
            for (let i = 0; i < contributors.length; i += cols) {
              const rowContributors = contributors.slice(i, i + cols);
              const cells = rowContributors.map(c => `<td align="center" valign="top" width="14.28%">
              <a href="${c.html_url}">
                <img src="${c.avatar_url}&s=100" width="80px" alt="${c.login}" style="border-radius:50%"/>
                <br /><sub><b>${c.login}</b></sub>
              </a>
            </td>`).join('\n');
              rows += `<tr>\n${cells}\n</tr>\n`;
            }

            const contributorsSection = `<!-- CONTRIBUTORS-START -->
            ## Contributors

            Thanks goes to these amazing people:

            <table>
            ${rows}</table>

            Want to contribute? Check out our [Contributing Guide](CONTRIBUTING.md).
            <!-- CONTRIBUTORS-END -->`;

            // Replace section in README between markers
            let readme = fs.readFileSync('README.md', 'utf8');

            const startMarker = '<!-- CONTRIBUTORS-START -->';
            const endMarker = '<!-- CONTRIBUTORS-END -->';

            if (readme.includes(startMarker) && readme.includes(endMarker)) {
              const before = readme.substring(0, readme.indexOf(startMarker));
              const after = readme.substring(readme.indexOf(endMarker) + endMarker.length);
              readme = before + contributorsSection + after;
            } else {
              // Append to end if markers don't exist yet
              readme = readme + '\n\n' + contributorsSection;
            }

            fs.writeFileSync('README.md', readme);
            console.log(`✅ Updated README with ${contributors.length} contributors`);

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update contributors list [skip ci]"
          git push
