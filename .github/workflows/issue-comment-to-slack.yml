name: Issue Comment To Slack

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read

jobs:
  notify-slack:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Post issue comment to Slack
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SLACK_GITHUB_ISSUES_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_ISSUES_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m app.integrations.github_issue_comments
